name: Deploy - Kubernetes (Multi-Project)

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    env:
      BASE_VERSION: ${{ vars.KUBERNETES_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set release number
        id: vars
        run: |
          RELEASE_VERSION="${{ env.BASE_VERSION }}.${{ github.run_number }}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: gitea:3000
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      # --- Frontend ---
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: Frontend
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          outputs: type=registry,oci-mediatypes=false
          tags: |
            gitea:3000/admin/sample-frontend:${{ env.RELEASE_VERSION }}
            gitea:3000/admin/sample-frontend:latest

      # --- API ---
      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: Api
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          outputs: type=registry,oci-mediatypes=false
          tags: |
            gitea:3000/admin/sample-api:${{ env.RELEASE_VERSION }}
            gitea:3000/admin/sample-api:latest

      - name: Push Build Information to Octopus Deploy
        uses: OctopusDeploy/push-build-information-action@v3
        with:
          packages: |
            sample-frontend
            sample-api
            sample-database
          version: ${{ env.RELEASE_VERSION }}
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          server: ${{ secrets.OCTOPUS_URL }}
          space: ${{ secrets.OCTOPUS_SPACE_ID }}

      - name: Create Frontend Release
        uses: OctopusDeploy/create-release-action@v3
        with:
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          server: ${{ secrets.OCTOPUS_URL }}
          space: ${{ secrets.OCTOPUS_SPACE_ID }}
          project: ${{ vars.KUBERNETES_FRONTEND }}
          channel: Automation
          release_number: ${{ env.RELEASE_VERSION }}

      - name: Create API Release
        uses: OctopusDeploy/create-release-action@v3
        with:
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          server: ${{ secrets.OCTOPUS_URL }}
          space: ${{ secrets.OCTOPUS_SPACE_ID }}
          project: ${{ vars.KUBERNETES_API }}
          channel: Automation
          release_number: ${{ env.RELEASE_VERSION }}

      - name: Create Database Release
        uses: OctopusDeploy/create-release-action@v3
        with:
          api_key: ${{ secrets.OCTOPUS_API_KEY }}
          server: ${{ secrets.OCTOPUS_URL }}
          space: ${{ secrets.OCTOPUS_SPACE_ID }}
          project: ${{ vars.KUBERNETES_DATABASE }}
          channel: Automation
          release_number: ${{ env.RELEASE_VERSION }}
