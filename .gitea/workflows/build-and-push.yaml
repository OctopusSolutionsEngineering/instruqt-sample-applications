name: Build and Push Images

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        run: |
          git clone --depth 1 --branch "${{ github.ref_name }}" \
            "${{ github.server_url }}/${{ github.repository }}.git" .

      - name: Generate semantic version
        id: vars
        run: |
          MAJOR=1
          MINOR=0
          PATCH=${{ github.run_number }}
          RELEASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $RELEASE_VERSION"

      - name: Log in to Gitea Container Registry
        run: |
            mkdir -p ~/.docker
            printf '{"auths":{"gitea:3000":{"auth":"%s"}}}' \
            "$(echo -n "${{ secrets.GITEAUSERNAME }}:${{ secrets.GITEATOKEN }}" | base64 -w 0)" \
            > ~/.docker/config.json


      - name: Set up Docker Buildx
        run: |
          cat > buildkitd.toml <<EOF
          [registry."gitea:3000"]
            http = true
            insecure = true
            username = "${{ secrets.GITEAUSERNAME }}"
            password = "${{ secrets.GITEATOKEN }}"
          [registry."registry:5000"]
            http = true
            insecure = true
          EOF
          docker buildx rm instruqt-builder 2>/dev/null || true
          docker buildx use instruqt-builder || docker buildx create --name instruqt-builder --config buildkitd.toml --use --bootstrap --driver-opt network=octopusdeploy_default


      # --- Frontend ---
      - name: Build & Push Frontend
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --output "type=registry,oci-mediatypes=false" \
            --secret id=REGISTRY_USER,env=REGISTRY_USER \
            --secret id=REGISTRY_PASS,env=REGISTRY_PASS \
            -t "gitea:3000/admin/sample-frontend:${{ env.RELEASE_VERSION }}" \
            -t "gitea:3000/admin/sample-frontend:latest" \
            Frontend/
        env:
          REGISTRY_USER: ${{ secrets.GITEAUSERNAME }}
          REGISTRY_PASS: ${{ secrets.GITEATOKEN }}

      # --- API ---
      - name: Build & Push API
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --output "type=registry,oci-mediatypes=false" \
            -t "gitea:3000/admin/sample-api:${{ env.RELEASE_VERSION }}" \
            -t "gitea:3000/admin/sample-api:latest" \
            Api/

      # --- Octopus release (frontend) ---
      # Creates a release for the "sample-frontend" project, but only if that
      # project already exists in Octopus. If it does not exist, the build has
      # already completed above so we simply finish successfully.
      - name: Create Octopus release for sample-frontend
        env:
          OCTOPUS_URL: ${{ secrets.OCTOPUSURL }}
          OCTOPUS_API_KEY: ${{ secrets.OCTOPUSAPIKEY }}
          OCTOPUS_SPACE: ${{ secrets.OCTOPUSSPACE }}
          PROJECT_NAME: sample-frontend
        run: |
          set -euo pipefail

          # Fall back to the track defaults when secrets are not configured.
          OCTOPUS_URL="${OCTOPUS_URL:-http://octopus:8080}"
          OCTOPUS_API_KEY="${OCTOPUS_API_KEY:-API-VRCTL0YFVVEEJLRBRPWH}"
          OCTOPUS_SPACE="${OCTOPUS_SPACE:-Spaces-1}"

          if ! command -v jq >/dev/null 2>&1; then
            echo "Installing jq..."
            (sudo apt-get update && sudo apt-get install -y jq) \
              || (apt-get update && apt-get install -y jq)
          fi

          echo "Looking up project '${PROJECT_NAME}' in Octopus (${OCTOPUS_URL})..."
          PROJECT=$(curl -fsS \
            -H "X-Octopus-ApiKey: ${OCTOPUS_API_KEY}" \
            "${OCTOPUS_URL}/api/${OCTOPUS_SPACE}/projects?partialName=${PROJECT_NAME}&take=100" \
            | jq -c --arg n "$PROJECT_NAME" 'first(.Items[] | select(.Name == $n)) // empty')

          if [ -z "$PROJECT" ]; then
            echo "Project '${PROJECT_NAME}' not found in Octopus — nothing to release. Build complete."
            exit 0
          fi

          PROJECT_ID=$(echo "$PROJECT" | jq -r '.Id')
          PERSISTENCE=$(echo "$PROJECT" | jq -r '.PersistenceSettings.Type // "Database"')
          DEFAULT_BRANCH=$(echo "$PROJECT" | jq -r '.PersistenceSettings.DefaultBranch // "main"')
          echo "Found project ${PROJECT_ID} (persistence: ${PERSISTENCE})."

          # Build the release-create command. For Config-as-Code projects a GitRef
          # is required; database-backed projects must not send one. We just built
          # and pushed the images tagged with RELEASE_VERSION, so resolve all
          # packages to that same version.
          BODY=$(jq -n \
            --arg space "$OCTOPUS_SPACE" \
            --arg project "$PROJECT_NAME" \
            --arg version "${{ env.RELEASE_VERSION }}" \
            --arg gitref "refs/heads/${DEFAULT_BRANCH}" \
            --arg persistence "$PERSISTENCE" \
            '{
               spaceIdOrName: $space,
               projectName: $project,
               releaseVersion: $version,
               packageVersion: $version
             } + (if $persistence == "VersionControlled" then {gitRef: $gitref} else {} end)')

          echo "Creating release ${{ env.RELEASE_VERSION }} for '${PROJECT_NAME}'..."
          RESPONSE=$(curl -fsS -X POST \
            -H "X-Octopus-ApiKey: ${OCTOPUS_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "${OCTOPUS_URL}/api/${OCTOPUS_SPACE}/releases/create/v1")

          echo "$RESPONSE" | jq -r '"✓ Created release \(.ReleaseVersion // "?") (\(.ReleaseId // "?"))"'
