name: Build and Push Images

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        run: |
          git clone --depth 1 --branch "${{ github.ref_name }}" \
            "${{ github.server_url }}/${{ github.repository }}.git" .

      - name: Generate semantic version
        id: vars
        run: |
          MAJOR=1
          MINOR=0
          PATCH=${{ github.run_number }}
          RELEASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $RELEASE_VERSION"

      - name: Log in to Gitea Container Registry
        run: |
            mkdir -p ~/.docker
            printf '{"auths":{"gitea:3000":{"auth":"%s"}}}' \
            "$(echo -n "${{ secrets.GITEAUSERNAME }}:${{ secrets.GITEATOKEN }}" | base64 -w 0)" \
            > ~/.docker/config.json


      - name: Set up Docker Buildx
        run: |
          cat > buildkitd.toml <<EOF
          [registry."gitea:3000"]
            http = true
            insecure = true
            username = "${{ secrets.GITEAUSERNAME }}"
            password = "${{ secrets.GITEATOKEN }}"
          [registry."registry:5000"]
            http = true
            insecure = true
          EOF
          docker buildx rm instruqt-builder 2>/dev/null || true
          docker buildx use instruqt-builder || docker buildx create --name instruqt-builder --config buildkitd.toml --use --bootstrap --driver-opt network=octopusdeploy_default


      # --- Frontend ---
      - name: Build & Push Frontend
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --output "type=registry,oci-mediatypes=false" \
            --secret id=REGISTRY_USER,env=REGISTRY_USER \
            --secret id=REGISTRY_PASS,env=REGISTRY_PASS \
            -t "gitea:3000/admin/sample-frontend:${{ env.RELEASE_VERSION }}" \
            -t "gitea:3000/admin/sample-frontend:latest" \
            Frontend/
        env:
          REGISTRY_USER: ${{ secrets.GITEAUSERNAME }}
          REGISTRY_PASS: ${{ secrets.GITEATOKEN }}

      # --- API ---
      - name: Build & Push API
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --output "type=registry,oci-mediatypes=false" \
            -t "gitea:3000/admin/sample-api:${{ env.RELEASE_VERSION }}" \
            -t "gitea:3000/admin/sample-api:latest" \
            Api/
